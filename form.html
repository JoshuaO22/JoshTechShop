<body>
    <header>
        <h1>JoshTechShop - Electronics Shop</h1>
    </header>

    <nav>
        <ul>
            <li><a href="./index.html">Home</a></li>
            <li><a href="./location.html">Location</a></li>
            <li><a href="./menu.html">Catalog</a></li>
            <li><a href="./form.html">Forms</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2>Repair & Customer Support Request</h2>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" placeholder="First & Last Name" required>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>
            <label for="address">Address:</label>
            <input type="text" id="address" name="address" placeholder="Street Address, City, State, ZIP Code" required>
            <label for="issue-type">Issue Type:</label>
            <input type="text" id="issue-type" list="issue-types" name="issue-type"
                placeholder="e.g., Repair, Customer Issue, etc" required>
            <datalist id="issue-types">
                <option value="Repair">
                <option value="Customer Issue">
                <option value="Other">
            </datalist>
            <label for="description">Issue Description:</label>
            <textarea id="description" name="description" rows="4" required></textarea>
        </form>

        <h2>Admin Login</h2>
        <form>
            <label for="admin-username">Username:</label>
            <input type="text" id="admin-username" name="admin-username" required>
            <label for="admin-password">Password:</label>
            <input type="password" id="admin-password" name="admin-password" required>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 JoshTechShop</p>
    </footer>
</body>
